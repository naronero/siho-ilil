<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시호일일 — 나로 오롯이 누리는 오늘이 좋은날</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --ink:#221F1A; --sub:#5C5648; --cap:#A69C8A;
    --line:#EAE2D2; --field:#F5EEE0; --bg:#FFFFFF; --paper:#FFFFFF;
    --accent:#C17C60; --tint:rgba(193,124,96,.08);
    --serif:"Nanum Myeongjo", serif;
    --sans:"Pretendard", -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.6;
    display:flex; justify-content:center;
  }
  .stage{ width:100%; max-width:480px; min-height:100vh; padding:36px 24px 40px; display:flex; flex-direction:column; }

  .masthead{ text-align:center; margin-bottom:26px; }
  .brand{ font-weight:800; font-size:17px; letter-spacing:-.01em; }
  .brand-sub{ margin-top:5px; font-size:12px; color:var(--cap); font-weight:400; }

  /* ── 입력 ── */
  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:24px; padding:32px 24px 28px; }
  .panel-title{ font-size:20px; font-weight:800; text-align:center; letter-spacing:-.02em; }
  .panel-sub{ margin-top:8px; text-align:center; font-size:13px; color:var(--sub); }
  .fgroup{ margin-top:26px; }
  .flabel{ font-size:12.5px; font-weight:600; color:var(--sub); margin-bottom:8px; display:block; }
  input[type="text"], .num, input[type="time"]{
    width:100%; font-family:var(--sans); font-size:16px; color:var(--ink);
    background:var(--field); border:none; border-radius:14px; padding:14px;
  }
  input:focus{ outline:2px solid var(--ink); outline-offset:0; }
  ::placeholder{ color:#C4BAA8; }
  .seg{ display:flex; gap:4px; background:var(--field); border-radius:14px; padding:4px; }
  .seg button{
    flex:1; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--sub);
    background:none; border:none; padding:10px 4px; border-radius:11px; cursor:pointer; transition:all .18s;
  }
  .seg button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 4px rgba(90,70,40,.10); }
  .date-row{ display:flex; gap:8px; }
  .date-row .cell{ flex:1; position:relative; }
  .date-row .cell span{ position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:13px; color:#C4BAA8; pointer-events:none; }
  .num{ -moz-appearance:textfield; }
  .num::-webkit-outer-spin-button,.num::-webkit-inner-spin-button{ -webkit-appearance:none; }
  .time-row{ display:flex; }
  .unknown{ margin-top:12px; display:flex; align-items:center; gap:9px; cursor:pointer; font-size:14px; font-weight:500; color:var(--sub); user-select:none; }
  .unknown input{ appearance:none; width:20px; height:20px; border:1.5px solid #D8CEBC; border-radius:6px; cursor:pointer; position:relative; flex:none; background:#fff; }
  .unknown input:checked{ background:var(--ink); border-color:var(--ink); }
  .unknown input:checked::after{ content:"✓"; color:#fff; font-size:12px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .hint{ margin-top:9px; font-size:12px; color:var(--cap); line-height:1.7; }
  .err{ margin-top:12px; font-size:13px; font-weight:500; color:#E5503C; display:none; }
  .cta{
    margin-top:28px; width:100%; font-family:var(--sans); font-size:16px; font-weight:700;
    color:var(--ink); background:#F1E8D7; border:none; cursor:pointer;
    padding:16px; border-radius:16px; transition:transform .12s, opacity .12s;
  }
  .cta:active{ transform:scale(.98); opacity:.9; }
  .btn.ghost{ display:none; }

  /* ── 오늘 ── */
  .greet{ text-align:center; margin-bottom:8px; font-size:19px; font-weight:800; letter-spacing:-.02em; color:var(--ink); }
  .today-line{ text-align:center; margin-bottom:44px; }
  .today-date{ font-size:13px; color:var(--cap); line-height:1.9; }
  .today-date .sep{ margin:0 6px; color:var(--line); }
  .today-ambient{ margin-top:6px; font-size:12.5px; font-weight:500; color:var(--accent); transition:color .5s; }
  .oracle{ text-align:center; background:#FCF9F2; border:none; border-radius:28px; padding:38px 24px 34px; }
  .gyeol-name{ font-family:var(--serif); font-weight:700; font-size:20px; line-height:1; letter-spacing:.06em; }
  .gyeol-name .hanja{ display:inline; margin-left:8px; font-size:12px; font-weight:400; letter-spacing:.3em; color:var(--accent); }
  .gyeol-tag{ margin-top:10px; font-size:15px; font-weight:600; color:var(--sub); }
  .divider{ width:22px; height:1px; background:#DCD2C0; margin:26px auto; }
  .oneline{
    font-family:var(--serif); font-size:26px; line-height:1.55; font-weight:700;
    color:var(--ink); word-break:keep-all; max-width:17ch; margin:0 auto; transition:opacity .35s;
  }
  .lucky{ margin-top:52px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
  .lucky div{ text-align:center; background:rgba(140,121,196,.13); border-radius:16px; padding:12px 18px; min-width:96px; }
  .lucky span{ display:block; font-size:12px; font-weight:600; color:#8C79C4; margin-bottom:3px; }
  .lucky b{ font-size:16.5px; font-weight:800; color:#6C59B8; }
  .tomorrow{ margin-top:12px; text-align:center; font-size:12.5px; font-weight:600; color:var(--accent); }
  .detail{ margin-top:18px; text-align:center; font-size:12px; color:var(--cap); line-height:1.95; padding:0 8px; }
  .controls{ text-align:center; margin:18px 0 4px; }
  .rotate, .linkbtn{
    font-family:var(--sans); font-size:13px; font-weight:600; color:var(--sub);
    background:var(--field); border:none; cursor:pointer; padding:10px 16px; border-radius:12px; margin:0 3px; transition:opacity .15s;
  }
  .rotate:active,.linkbtn:active{ opacity:.7; }
  .foot{ margin-top:auto; padding-top:32px; text-align:center; font-size:11px; color:#C0B6A4; line-height:1.8; }
  .hidden{ display:none !important; }
  .fadeout{ opacity:0; }

  /* ── 스플래시: 나로가 지나간 길에 슬로건이 남는다 ── */
  #splash{ position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; opacity:1; transition:opacity .5s ease; }
  #splash.out{ opacity:0; pointer-events:none; }
  .sp-inner{ position:relative; width:min(340px,84vw); text-align:center; }
  .sp-slogan{
    display:inline-block; font-size:15px; font-weight:600; color:var(--sub); letter-spacing:-.01em;
    clip-path:inset(-60px 0 0 100%); animation:spRev 3.8s .25s ease-in-out forwards;
  }
  @keyframes spRev{ to{ clip-path:inset(-60px 0 0 0); } }
  .sp-naro{
    position:absolute; width:112px; top:-52px; right:-20px; z-index:2;
    transform-origin:50% 100%;
    transform:translateX(130px); animation:spCrawl 3.8s .25s ease-in-out forwards;
  }
  @keyframes spCrawl{
    0%{   transform:translateX(130px)  scaleX(1)   scaleY(1); }
    6%{   transform:translateX(118px)  scaleX(.86) scaleY(1.07); }
    14%{  transform:translateX(40px)   scaleX(1.03) scaleY(.99); }
    20%{  transform:translateX(28px)   scaleX(1)   scaleY(1); }
    26%{  transform:translateX(16px)   scaleX(.86) scaleY(1.07); }
    34%{  transform:translateX(-62px)  scaleX(1.03) scaleY(.99); }
    40%{  transform:translateX(-74px)  scaleX(1)   scaleY(1); }
    46%{  transform:translateX(-86px)  scaleX(.86) scaleY(1.07); }
    54%{  transform:translateX(-164px) scaleX(1.03) scaleY(.99); }
    60%{  transform:translateX(-176px) scaleX(1)   scaleY(1); }
    66%{  transform:translateX(-188px) scaleX(.86) scaleY(1.07); }
    74%{  transform:translateX(-266px) scaleX(1.03) scaleY(.99); }
    80%{  transform:translateX(-278px) scaleX(1)   scaleY(1); }
    86%{  transform:translateX(-290px) scaleX(.86) scaleY(1.06); }
    100%{ transform:translateX(-480px) scaleX(1)   scaleY(1); }
  }
  .sp-brand{ margin-top:16px; font-size:20px; font-weight:800; letter-spacing:-.01em; opacity:0; animation:spFade .5s 3.9s ease forwards; }
  @keyframes spFade{ to{ opacity:1; } }
  @media (prefers-reduced-motion:reduce){
    .sp-slogan{ clip-path:inset(0 0 0 0); animation:none; }
    .sp-naro{ display:none; }
    .sp-brand{ opacity:1; animation:none; }
  }


  /* ── 오늘의 운세 지수 ── */
  .score-block{ margin-top:26px; }
  .score-label{ font-size:12px; font-weight:600; color:var(--cap); }
  .score-num{ margin-top:2px; font-size:46px; font-weight:800; color:#6C59B8; line-height:1.1; letter-spacing:-.02em; }
  .score-num small{ font-size:20px; font-weight:700; }
  .score-grade{ display:inline-block; margin-top:6px; font-size:12.5px; font-weight:700; color:#6C59B8; background:rgba(140,121,196,.13); padding:4px 12px; border-radius:999px; }
  /* ── 사주 총평 ── */
  .reading{ margin-top:26px; font-size:14.5px; line-height:1.9; color:var(--sub); word-break:keep-all; max-width:34ch; margin-left:auto; margin-right:auto; text-align:center; }
  /* ── 영역별 운세 4칸 ── */
  .area-grid{ margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .area-card{ background:#FCF9F2; border-radius:20px; padding:16px 14px; text-align:center; }
  .area-name{ font-size:12.5px; font-weight:700; color:var(--sub); }
  .area-score{ margin-top:2px; font-size:22px; font-weight:800; color:#6C59B8; }
  .area-line{ margin-top:6px; font-size:12px; line-height:1.65; color:var(--cap); word-break:keep-all; }
  /* ── 레이더(총운) 카드 ── */
  .radar-card{ margin-top:20px; background:#FCF9F2; border:none; border-radius:28px; padding:28px 22px 16px; text-align:center; }
  .radar-label{ font-size:12.5px; font-weight:700; color:#8C79C4; }
  .radar-title{ margin-top:4px; font-size:19px; font-weight:800; letter-spacing:-.02em; }
  .radar-wrap{ margin-top:6px; }
  .radar-wrap svg{ width:100%; height:auto; display:block; }

  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>

<main class="stage">
  <header class="masthead">
    <div class="brand">시호일일</div>
    <div class="brand-sub">나로 오롯이 누리는 오늘이 좋은날</div>
  </header>

  <!-- ═══ 화면 A: 나의 사주 적기 ═══ -->
  <section id="screenInput">
    <div class="panel">
      <div class="panel-title">나의 사주 적기</div>
      <div class="panel-sub">한 번 적어두면, 매일 아침 오늘의 한 줄이 찾아와요</div>

      <div class="fgroup">
        <label class="flabel">이름 (선택)</label>
        <input type="text" id="fName" placeholder="부르고 싶은 이름" maxlength="10" autocomplete="off">
      </div>

      <div class="fgroup">
        <label class="flabel">달력</label>
        <div class="seg" id="calSeg">
          <button data-v="solar" class="on">양력</button>
          <button data-v="lunar">음력</button>
        </div>
      </div>

      <div class="fgroup">
        <label class="flabel">생년월일</label>
        <div class="date-row">
          <div class="cell"><input class="num" type="number" id="fY" placeholder="1990" min="1900" max="2049"><span>년</span></div>
          <div class="cell"><input class="num" type="number" id="fM" placeholder="3" min="1" max="12"><span>월</span></div>
          <div class="cell"><input class="num" type="number" id="fD" placeholder="21" min="1" max="30"><span>일</span></div>
        </div>
      </div>

      <div class="fgroup hidden" id="leapAsk">
        <label class="flabel" id="leapQ">그 해엔 윤달도 있었어요. 어느 쪽인가요?</label>
        <div class="seg" id="leapSeg">
          <button data-l="0" class="on">평달 (일반)</button>
          <button data-l="1">윤달</button>
        </div>
        <div class="hint">잘 모르겠다면 '평달'이 맞을 확률이 높아요.</div>
      </div>

      <div class="fgroup">
        <label class="flabel">태어난 시간</label>
        <div class="time-row"><input type="time" id="fT" value="09:30"></div>
        <label class="unknown"><input type="checkbox" id="fUnknown"> 태어난 시간을 몰라요</label>
        <div class="hint" id="timeHint">분까지 정확할수록 좋아요. 시간의 경계(예: 1시 29분과 1시 30분)에서 기둥이 달라져요.</div>
      </div>

      <div class="err" id="fErr"></div>
      <button class="cta" id="goBtn">오늘의 한 줄 받기</button>
      <button class="linkbtn hidden" id="resetBtn" style="display:block;margin:14px auto 0;background:none;">저장된 정보 지우고 처음부터</button>
    </div>
  </section>

  <!-- ═══ 화면 B: 오늘의 한 줄 ═══ -->
  <section id="screenToday" class="hidden">
    <div class="panel oracle">
      <div class="greet" id="greet">오늘</div>
      <div class="today-line">
        <div class="today-date" id="dateLine"></div>
        <div class="today-ambient" id="ambient"></div>
      </div>

      <div class="gyeol-name" id="gyeolName"></div>
      <div class="gyeol-tag" id="gyeolTag"></div>

      <div class="score-block">
        <div class="score-label">오늘의 운세 지수</div>
        <div class="score-num" id="scoreNum"></div>
        <div class="score-grade" id="scoreGrade"></div>
      </div>

      <div class="divider"></div>
      <p class="oneline" id="oneline"></p>
      <div class="reading" id="reading"></div>
      <div class="lucky" id="lucky"></div>
    </div>

    <div class="tomorrow" id="tomorrow"></div>

    <div class="area-grid" id="areaGrid"></div>

    <div class="radar-card">
      <div class="radar-title">오늘의 운세 흐름 읽기</div>
      <div class="radar-wrap" id="radarWrap"></div>
    </div>

    <div class="detail" id="detail"></div>

    <div class="controls">
      <button class="linkbtn" id="editBtn">내 정보 고치기</button>
    </div>
  </section>

  <footer class="foot">
    <span id="storageNote">사주 정보는 이 기기 브라우저에만 저장돼요</span><br>
    만세력: KASI 데이터 + 천문 절기 계산 · 시호일일
  </footer>
</main>

function termJD(y,lon){ /* 해당 연도 절(節)의 순간 JD(UT) */

function yearMonthPillar(y,mo,d,h,mi){
  const bj=jdKST(y,mo,d,h,mi);

  const ys=((sy-4)%10+10)%10, yb=((sy-4)%12+12)%12;
  let cur=null;                                     /* 월주: 직전 절 */
  for(const Y of [y-1,y]) for(let i=0;i<12;i++){
    const j=termJD(Y,JEOL_LONS[i]);
    if(j<=bj && (!cur||j>cur.j)) cur={j,br:BR_OF_JEOL[i]};
  }
  const ms=(((ys%5)*2+2)+((cur.br-2+12)%12))%10;

function computePillars(J, timeKnown, hh, mm){
  let dayJ=J, night=false;
  if(timeKnown){
    const t=hh*60+mm;
    if(t>=1410){ dayJ=J+1; night=true; }  /* 야자시: 23:30~ → 일주 다음 날 */
  }
  const di=pilIdx(dayJ);
  const out={ dayPillar:pilName(di), dayStem:CG[di%10], dayEl:STEM_EL[CG[di%10]], night };
  if(timeKnown){
    const br=branchOf(hh*60+mm);
    out.hourPillar=CG[hourStem(di%10,br)]+JJ[br];
  }
  /* 년주·월주: 절기 순간 기준 (시간 모름 → 정오 관례로 경계 판정) */
  const s=jdn2sol(J);
  const ym=yearMonthPillar(s.year, s.month, s.day, timeKnown?hh:12, timeKnown?mm:0);
  out.yearPillar=ym.yp; out.monthPillar=ym.mp;
  return out;
}

const BRANCH_EL={자:"수",축:"토",인:"목",묘:"목",진:"토",사:"화",오:"화",미:"토",신:"금",유:"금",술:"토",해:"수"};
/* ── 십신 10종 (음양 구분) ── */
function sibsin10(myIdx, tIdx){
  const me=CG[myIdx], t=CG[tIdx];
  const mEl=STEM_EL[me], tEl=STEM_EL[t];
  const same=(myIdx%2)===(tIdx%2);
  if(tEl===mEl)            return same?"비견":"겁재";
  if(GEN[mEl]===tEl)       return same?"식신":"상관";
  if(CON[mEl]===tEl)       return same?"편재":"정재";
  if(CON[tEl]===mEl)       return same?"편관":"정관";
  if(GEN[tEl]===mEl)       return same?"편인":"정인";
}

function branchRel(mine, today){
  if(YUKHAP[mine]===today) return "합";
  if(CHUNG[mine]===today) return "충";
  return "";
}

const SIBSIN_W={정인:16,정재:15,식신:15,정관:14,비견:11,편재:11,편인:7,상관:5,겁재:3,편관:3};
function todayScore(ss, rel, seed){
  let s=58+(SIBSIN_W[ss]||8);
  if(rel==="합") s+=8; if(rel==="충") s-=9;
  let r=seed>>>0; r=(r*9301+49297)%233280;
  s+=Math.floor(r/233280*12)-5;
  return Math.max(46,Math.min(97,s));
}
const gradeOf=s=> s>=90?"아주 좋음": s>=78?"좋음": s>=62?"무난한 흐름":"조심조심";

const genOf=el=>({화:"목",토:"화",금:"토",수:"금",목:"수"})[el]; /* 나를 生하는 오행 */
const SIBSIN_FORTUNE={재성:"재물운",관성:"사업운",인성:"학업운",비겁:"건강운",식상:"연애운"};
/* 오늘 일진(천간+지지)이 내 일간과 맺는 십신 → 5운 활성도. 하루 고정(결정론). */
function radarScores(myEl, todayIdx, seed){
  const F=["재물운","연애운","사업운","건강운","학업운"];
  const sc={재물운:58,연애운:58,사업운:58,건강운:58,학업운:58};
  const r1=sibsin(myEl, STEM_EL[CG[todayIdx%10]]);
  const r2=sibsin(myEl, BRANCH_EL[JJ[todayIdx%12]]);
  if(r1) sc[SIBSIN_FORTUNE[r1]]+=24;
  if(r2) sc[SIBSIN_FORTUNE[r2]]+=16;
  let s=seed>>>0;
  for(const k of F){ s=(s*9301+49297)%233280; sc[k]+=Math.floor(s/233280*14)-7; }
  for(const k of F) sc[k]=Math.max(42,Math.min(95,sc[k]));
  return sc;
}
function renderRadar(sc){
  const F=["재물운","연애운","사업운","건강운","학업운"]; /* 상단부터 시계방향 */
  const cx=160, cy=152, R=96;
  const pt=(i,r)=>{ const a=(-90+i*72)*Math.PI/180; return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; };
  const poly=r=>F.map((_,i)=>pt(i,r).map(v=>v.toFixed(1)).join(",")).join(" ");
  let svg=`<svg viewBox="0 0 320 306" xmlns="http://www.w3.org/2000/svg">`;
  for(const g of [1,.75,.5,.25]) svg+=`<polygon points="${poly(R*g)}" fill="none" stroke="#E7DECD" stroke-width="1" stroke-dasharray="${g===1?'none':'3 3'}"/>`;
  for(let i=0;i<5;i++){ const [x,y]=pt(i,R); svg+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#F0E9DB" stroke-width="1"/><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.6" fill="#fff" stroke="#D9CFBC"/>`; }
  const dp=F.map((k,i)=>pt(i,R*(sc[k]/100)).map(v=>v.toFixed(1)).join(",")).join(" ");
  svg+=`<polygon points="${dp}" fill="#9C8CCB" fill-opacity=".22" stroke="#8C79C4" stroke-width="2" stroke-linejoin="round"/>`;
  F.forEach((k,i)=>{ const [x,y]=pt(i,R*(sc[k]/100)); svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#8C79C4"/>`; });
  const LBL=[[cx,cy-R-16,"middle"],[cx+R+12,cy-R*0.28,"start"],[cx+R*0.68,cy+R+22,"middle"],[cx-R*0.68,cy+R+22,"middle"],[cx-R-12,cy-R*0.28,"end"]];
  F.forEach((k,i)=>{ const [x,y,an]=LBL[i]; svg+=`<text x="${x}" y="${y}" text-anchor="${an}" font-size="13" font-weight="600" fill="#A69C8A" font-family="Pretendard,sans-serif">${k} <tspan fill="#8C79C4" font-weight="800">${sc[k]}</tspan></text>`; });
  svg+=`</svg>`;
  $("radarWrap").innerHTML=svg;
}

/* ── 오늘 화면 로직 ── */
function todayJdn(){ const n=new Date(); return jdn(n.getFullYear(), n.getMonth()+1, n.getDate()); }

function ambientText(tj){
  const s=jdn2sol(tj), lun=jdn2lun(tj);
  let moon=lun?MOON(lun.ld):"";
  let term="";
  const pool=[...(TERMS[s.year]||[]).map(t=>({n:t[0],J:jdn(s.year,t[1],t[2])})),
              ...(TERMS[s.year+1]||[]).slice(0,2).map(t=>({n:t[0],J:jdn(s.year+1,t[1],t[2])}))];
  for(const t of pool){
    const diff=t.J-tj;
    if(Math.abs(diff)<=3){
      term = diff===0?`오늘은 ${t.n}`: diff>0?`${t.n} ${diff}일 전`:`${t.n} 지나 ${-diff}일`;
      break;
    }
  }
  return [moon,term].filter(Boolean).join(" · ");
}

function enterToday(){
  const tj=todayJdn();
  const s=jdn2sol(tj), lun=jdn2lun(tj);
  const W="일월화수목금토"[new Date().getDay()];

  /* 오늘 일진 & 내 일간 → 결 */
  const todayIdx=pilIdx(tj);
  const todayStem=CG[todayIdx%10], todayEl=STEM_EL[todayStem];
  const me=computePillars(profile.birthJ, profile.timeKnown, profile.hh, profile.mm);
  const rel=sibsin(me.dayEl, todayEl);
  cur.gyeol=SIBSIN_GYEOL[rel];

  /* 하루 고정 시드: 같은 날·같은 사람 = 같은 한 줄 (일관성) */
  let hash=profile.y*372+profile.m*31+profile.d+(profile.timeKnown?profile.hh*60+profile.mm:0);
  for(const ch of (profile.name||"")) hash+=ch.charCodeAt(0);
  cur.idx=(tj+hash)%LINES[cur.gyeol].length;
  cur.tj=tj;
  renderRadar(radarScores(me.dayEl, todayIdx, tj*31+hash));

  /* 오늘의 행운 (매일 결정론 회전) */
  const fav=[genOf(me.dayEl), me.dayEl];
  const cEl=fav[(tj+hash)%2], dEl=fav[(tj+hash+1)%2];
  const num=((tj*7+hash)%9)+1;
  $("lucky").innerHTML=
    `<div><span>오늘의 색</span><b>${EL_COLOR[cEl]}</b></div>`+
    `<div><span>오늘의 숫자</span><b>${num}</b></div>`+
    `<div><span>좋은 방향</span><b>${EL_DIR[dEl]}</b></div>`;

  /* 오늘의 운세 지수 + 사주 총평 (십신10·합충 기반) */
  const myStemIdx=CG.indexOf(me.dayStem);
  const ss10=sibsin10(myStemIdx, todayIdx%10);
  const myBranch=me.dayPillar[1], todayBranch=JJ[todayIdx%12];
  const bRel=branchRel(myBranch, todayBranch);
  const score=todayScore(ss10, bRel, tj*53+hash);
  $("scoreNum").innerHTML=score+'<small>점</small>';
  $("scoreGrade").textContent=gradeOf(score);
  let reading=ILGAN_READ[me.dayStem]+" "+SIBSIN_READ[ss10];
  if(bRel) reading+=" "+HAP_READ[bRel];
  $("reading").textContent=reading;

  /* 영역별 운세 4칸 (레이더 점수 재사용) */
  const areaSc=radarScores(me.dayEl, todayIdx, tj*31+hash);
  const lv=v=> v>=75?"H": v>=60?"M":"L";
  $("areaGrid").innerHTML=["재물운","연애운","사업운","건강운"].map(k=>
    `<div class="area-card"><div class="area-name">${k}</div><div class="area-score">${areaSc[k]}</div><div class="area-line">${AREA_READ[k][lv(areaSc[k])]}</div></div>`
  ).join("");

  /* 내일 결 예고 */
  const tIdx=pilIdx(tj+1), tEl=STEM_EL[CG[tIdx%10]];
  const tGy=SIBSIN_GYEOL[sibsin(me.dayEl,tEl)];
  $("tomorrow").textContent = (tGy===cur.gyeol)
    ? `내일도 「${tGy}」의 결이 이어져요`
    : `내일은 「${tGy}」의 결이 찾아와요`;

  /* 헤더 */
  $("greet").textContent = profile.name ? `${profile.name}의 오늘` : "오늘";
  $("dateLine").innerHTML =
    `${s.year}년 ${s.month}월 ${s.day}일 ${W}요일`+
    `<span class="sep">·</span>음력 ${lun?`${lun.il?"윤":""}${lun.lm}월 ${lun.ld}일`:"—"}`+
    `<span class="sep">·</span>${pilName(todayIdx)}(${todayEl})의 날`;
  $("ambient").textContent=ambientText(tj);

  paint(false);
  $("screenInput").classList.add("hidden");
  $("screenToday").classList.remove("hidden");
}

function paint(animate){
  const g=GYEOL[cur.gyeol];
  const main=LINES[cur.gyeol][cur.idx];
  const apply=()=>{
    document.documentElement.style.setProperty("--accent",g.accent);
    document.documentElement.style.setProperty("--tint",g.tint);
    $("gyeolName").textContent=cur.gyeol;
    $("gyeolTag").textContent=g.tag;
    $("oneline").textContent=main;
    const me=computePillars(profile.birthJ, profile.timeKnown, profile.hh, profile.mm);
    let det=`나의 만세력 — 년주 ${me.yearPillar} · 월주 ${me.monthPillar} · 일주 ${me.dayPillar}`;
    if(profile.timeKnown){
      det+=` · 시주 ${me.hourPillar}`;
      if(me.night) det+=`<br>야자시(23:30 이후) — 일주는 다음 날 기준이에요`;
    } else {
      det+=`<br>시간 모름 · 세 기둥(년·월·일)으로 보았어요 — 오늘의 결은 똑같이 정확해요`;
    }
    det+=`<br>일간 ${me.dayStem}(${me.dayEl}) — 오늘의 결은 여기서 와요`;
    $("detail").innerHTML=det;
  };
  if(animate){
    $("oneline").classList.add("fadeout");
    setTimeout(()=>{ apply(); $("oneline").classList.remove("fadeout"); },300);
  } else apply();
}

$("editBtn").addEventListener("click",()=>{
  if(profile){
    $("fName").value=profile.name||"";
    calType=(profile.calType==="lunarLeap")?"lunar":profile.calType;
    [...$("calSeg").children].forEach(x=>x.classList.toggle("on",x.dataset.v===calType));
    $("fY").value=profile.y; $("fM").value=profile.m; $("fD").value=profile.d;
    leapSel=(profile.isLeap||profile.calType==="lunarLeap")?1:0;
    checkLeapAsk();
    [...$("leapSeg").children].forEach((x,i)=>x.classList.toggle("on",i===leapSel));
    $("fUnknown").checked=!profile.timeKnown;
    $("fT").disabled=!profile.timeKnown; $("fT").style.opacity=profile.timeKnown?1:0.35;
    if(profile.timeKnown) $("fT").value=String(profile.hh).padStart(2,"0")+":"+String(profile.mm).padStart(2,"0");
  }
  $("screenToday").classList.add("hidden");
  $("screenInput").classList.remove("hidden");
  if(profile) $("resetBtn").classList.remove("hidden");
});

$("resetBtn").addEventListener("click",()=>{
  store.clear(); profile=null; cur={gyeol:null, idx:0};
  $("fName").value=""; $("fY").value=""; $("fM").value=""; $("fD").value="";
  calType="solar"; leapSel=0;
  [...$("calSeg").children].forEach((x,i)=>x.classList.toggle("on",i===0));
  $("leapAsk").classList.add("hidden");
  $("fUnknown").checked=false; $("fT").disabled=false; $("fT").style.opacity=1; $("fT").value="09:30";
  $("resetBtn").classList.add("hidden");
});

/* ── 스플래시: 나로가 지나가면 본 화면 ── */
(function splash(){
  const sp=document.getElementById("splash");
  if(!sp) return;
  const close=()=>{ sp.classList.add("out"); setTimeout(()=>sp.remove(), 550); };
  if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches){ setTimeout(close, 700); }
  else setTimeout(close, 4900);
  sp.addEventListener("click", close);
})();

/* ── 날짜 갱신: 자정을 넘기거나 탭으로 돌아오면 오늘을 다시 계산 ── */
function refreshIfNewDay(){
  if(profile && cur.tj && todayJdn()!==cur.tj) enterToday();
}
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refreshIfNewDay(); });
window.addEventListener("pageshow", refreshIfNewDay);
window.addEventListener("focus", refreshIfNewDay);
setInterval(refreshIfNewDay, 60000);

/* ── 부팅: 저장된 사주가 있으면 바로 '오늘의 한 줄' (점신처럼 열자마자 오늘) ── */
(function boot(){
  const saved=store.load();
  if(saved && saved.birthJ){ profile=saved; enterToday(); }
  const note=$("storageNote");
  if(note) note.textContent = store.ok
    ? "사주 정보는 이 기기 브라우저에만 저장돼요"
    : "이 미리보기에선 새로고침 시 입력이 초기화돼요 (배포하면 기기에 저장)";
})();
</script>
